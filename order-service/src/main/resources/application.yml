server:
  port: 8081

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3307/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.ecom.*"

# Actuator - expose all endpoints including prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0   # 100% in dev — use 0.1 in prod

# OpenTelemetry → Tempo
otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317
  resource:
    attributes:
      service.name: ${spring.application.name}

logging:
  level:
    com.ecom: DEBUG
    org.springframework.kafka: INFO

# ── Feign: URL of inventory-service ──────────────────────────────────────────
# In production with Eureka/K8s, you'd use service discovery instead of a hardcoded URL
services:
  inventory:
    url: http://localhost:8082

# ── Feign timeout settings ────────────────────────────────────────────────────
spring:
  cloud:
    openfeign:
      client:
        config:
          inventory-service:
            connect-timeout: 2000   # fail fast if can't connect in 2s
            read-timeout: 3000      # fail fast if no response in 3s

# ── Resilience4j Circuit Breaker ─────────────────────────────────────────────
# Think of it as an automatic fuse box for HTTP calls
resilience4j:
  circuitbreaker:
    instances:
      inventory-service:
        # Open circuit after 50% of last 5 calls fail
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        # Once open, wait 10s before trying again (half-open state)
        wait-duration-in-open-state: 10s
        # In half-open, allow 2 test calls to check if service recovered
        permitted-number-of-calls-in-half-open-state: 2
        # Track calls in a sliding window of last 10 calls
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        # Register metrics so circuit state is visible in Grafana
        register-health-indicator: true
  timelimiter:
    instances:
      inventory-service:
        timeout-duration: 3s   # Feign call must complete within 3s or fallback triggers

